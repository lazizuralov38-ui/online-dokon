<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tizimga Kirish</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow-sm border-0 p-4">
                    <h3 class="text-center fw-bold mb-4 text-dark">Tizimga kirish</h3>
                    <form method="post">
                        {% csrf_token %}
                        {% for field in form %}
                            <div class="mb-3">
                                <label class="form-label fw-bold small text-secondary">{{ field.label }}</label>
                                {{ field }}
                                {% if field.errors %}
                                    <div class="text-danger small">{{ field.errors }}</div>
                                {% endif %}
                            </div>
                        {% endfor %}
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary fw-bold">Kirish</button>
                        </div>
                    </form>
                    <div class="text-center mt-3 small">
                        Akkountingiz yo'qmi? <a href="{% url 'register' %}" class="text-decoration-none">Ro'yxatdan o'tish</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.querySelectorAll('input').forEach(input => {
            if (input.type !== 'submit') {
                input.classList.add('form-control');
            }
        });
    </script>
</body>
</html>
